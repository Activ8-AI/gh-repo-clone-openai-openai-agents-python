\
name: Charter Standard\n\n\
on:\n  push:\n    branches: [ main, master ]\n  pull_request:\n    branches: [ main, master ]\n\n\
jobs:\n  charter:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout\n        uses: actions/checkout@v4\n\n      - name: Verify AGENTS.md exists\n        run: test -f AGENTS.md\n\n      - name: Optional Charter Check\n        run: |\n          if [ -f scripts/charterCheck.js ]; then\n            node scripts/charterCheck.js;\n          else\n            echo "No charterCheck.js present; skipping";\n          fi\n\n      - name: Optional Node tests\n        continue-on-error: true\n        run: |\n          if [ -f package.json ]; then\n            npm i --ignore-scripts || true;\n            npm test || true;\n          else\n            echo "No package.json; skipping tests";\n          fi\n\n      - name: Optional Python tests\n        continue-on-error: true\n        run: |\n          if [ -f requirements.txt ]; then\n            pip install -r requirements.txt;\n            pytest || true;\n          else\n            echo "No requirements.txt; skipping tests";\n          fi\n
